<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión con Google</title>
  <style>
    :root {
      --bg: #030306;
      --card: #0c0c14;
      --border: #222230;
      --text: #ffffff;
      --text-muted: #8e8e9f;
      --google-blue: #4A80F5;
      --primary: #E21B1B;
      --primary-glow: rgba(226, 27, 27, 0.4);
    }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .oauth-container {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 35px;
      width: 400px;
      max-width: 90%;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
      position: relative;
    }
    .oauth-container::before {
      content: '';
      position: absolute;
      top: -1px;
      left: -1px;
      right: -1px;
      height: 3px;
      background: linear-gradient(90deg, #4A80F5, #EA4335, #FBBC05, #34A853);
      border-radius: 12px 12px 0 0;
    }
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    .google-logo {
      display: flex;
      justify-content: center;
      gap: 3px;
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .acc-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 0 0 6px 0;
    }
    .acc-subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin: 0;
    }
    .account-list {
      max-height: 200px;
      overflow-y: auto;
      margin-bottom: 20px;
    }
    .account-item {
      display: flex;
      align-items: center;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .account-item:hover {
      background: rgba(255, 255, 255, 0.03);
      border-color: var(--google-blue);
    }
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #E21B1B;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      margin-right: 12px;
      font-size: 1.1rem;
      box-shadow: 0 0 10px rgba(226, 27, 27, 0.4);
    }
    .details {
      flex: 1;
      text-align: left;
    }
    .name {
      font-size: 0.9rem;
      font-weight: 600;
    }
    .email {
      font-size: 0.78rem;
      color: var(--text-muted);
    }
    .custom-input-box {
      display: none;
      margin-bottom: 20px;
      text-align: left;
    }
    .custom-input-box label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 6px;
      font-weight: 600;
    }
    .custom-input-box input {
      width: 100%;
      background: #030306;
      border: 1px solid var(--border);
      color: #fff;
      padding: 10px;
      border-radius: 6px;
      font-size: 0.9rem;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.2s;
    }
    .custom-input-box input:focus {
      border-color: var(--google-blue);
    }
    .permissions-box {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 24px;
      text-align: left;
    }
    .permissions-title {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .permission-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 0.8rem;
      margin-bottom: 10px;
      line-height: 1.4;
    }
    .permission-item input {
      margin-top: 2px;
      accent-color: var(--google-blue);
    }
    .loading-screen {
      display: none;
      text-align: center;
      padding: 40px 0;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(74, 128, 245, 0.1);
      border-radius: 50%;
      border-top-color: var(--google-blue);
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .btn-allow {
      width: 100%;
      background: var(--google-blue);
      color: #fff;
      border: none;
      padding: 12px;
      font-weight: 700;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    .btn-allow:hover {
      background: #356ae6;
    }
  </style>
</head>
<body>
  <div class="oauth-container" id="selection-card">
    <div class="header">
      <div class="google-logo">
        <span style="color: #4A80F5">G</span>
        <span style="color: #EA4335">o</span>
        <span style="color: #FBBC05">o</span>
        <span style="color: #4A80F5">g</span>
        <span style="color: #34A853">l</span>
        <span style="color: #EA4335">e</span>
      </div>
      <h2 class="acc-title" id="card-title">Elige una cuenta</h2>
      <p class="acc-subtitle">para continuar a GoogleUp Adventures</p>
    </div>

    <!-- Account Picker -->
    <div class="account-list" id="account-list">
      <div class="account-item" onclick="selectGaston()">
        <div class="avatar" style="background: var(--google-blue);">G</div>
        <div class="details">
          <div class="name">Gastón Morante</div>
          <div class="email">gastonmorante@gmail.com</div>
        </div>
      </div>
      <div class="account-item" onclick="showCustomInput()">
        <div class="avatar" style="background: #333;">+</div>
        <div class="details">
          <div class="name">Usar otra cuenta</div>
          <div class="email">Iniciar sesión con otro correo de Gmail</div>
        </div>
      </div>
    </div>

    <!-- Custom Email input form -->
    <div class="custom-input-box" id="custom-email-box">
      <label for="custom-email">Correo electrónico de Gmail</label>
      <input type="email" id="custom-email" placeholder="ejemplo@gmail.com">
      <button class="btn-allow" style="margin-top: 15px; background: #333; border: 1px solid var(--border);" onclick="backToPicker()">← Volver a cuentas</button>
    </div>

    <!-- Permissions box -->
    <div class="permissions-box">
      <div class="permissions-title">Permisos solicitados</div>
      <div class="permission-item">
        <input type="checkbox" id="perm-calendar" checked disabled>
        <label for="perm-calendar">Ver y descargar los calendarios de Google (Expediciones y Grabaciones).</label>
      </div>
      <div class="permission-item">
        <input type="checkbox" id="perm-music" checked>
        <label for="perm-music">Vincular licencias y reproducir contenido de YouTube Music en NegocioUp Radio.</label>
      </div>
      <div class="permission-item">
        <input type="checkbox" id="perm-voice" checked>
        <label for="perm-voice">Sincronizar control y reconocimiento de voz satelital de Gemini AI.</label>
      </div>
    </div>

    <button class="btn-allow" onclick="allowAccess()">Permitir y Conectar</button>
  </div>

  <div class="oauth-container loading-screen" id="loading-card">
    <div class="spinner"></div>
    <h3 style="margin-bottom: 8px;">Conectando con Google Cloud...</h3>
    <p id="loading-status" style="font-size: 0.8rem; color: var(--text-muted); margin: 0;">Verificando credenciales del sistema...</p>
  </div>

  <script>
    let selectedEmail = "gastonmorante@gmail.com";
    let selectedName = "Gastón Morante";
    let customMode = false;

    // Read query parameters
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('mode') === 'any') {
      showCustomInput();
    }

    function selectGaston() {
      selectedEmail = "gastonmorante@gmail.com";
      selectedName = "Gastón Morante";
      customMode = false;
      document.querySelectorAll('.account-item')[0].style.borderColor = '#4A80F5';
      document.querySelectorAll('.account-item')[0].style.background = 'rgba(74, 128, 245, 0.05)';
      document.querySelectorAll('.account-item')[1].style.borderColor = 'var(--border)';
      document.querySelectorAll('.account-item')[1].style.background = 'none';
    }

    function showCustomInput() {
      customMode = true;
      document.getElementById('account-list').style.display = 'none';
      document.getElementById('custom-email-box').style.display = 'block';
      document.getElementById('card-title').textContent = "Iniciar sesión";
      document.getElementById('custom-email').focus();
    }

    function backToPicker() {
      customMode = false;
      document.getElementById('account-list').style.display = 'block';
      document.getElementById('custom-email-box').style.display = 'none';
      document.getElementById('card-title').textContent = "Elige una cuenta";
    }

    function allowAccess() {
      if (customMode) {
        const emailInput = document.getElementById('custom-email').value.trim();
        if (!emailInput || !emailInput.includes('@')) {
          alert("Por favor, introduce un correo de Gmail válido.");
          return;
        }
        selectedEmail = emailInput;
        // Generate a name from the email prefix
        const prefix = emailInput.split('@')[0];
        selectedName = prefix.charAt(0).toUpperCase() + prefix.slice(1);
      }
      
      document.getElementById('selection-card').style.display = 'none';
      document.getElementById('loading-card').style.display = 'block';

      const status = document.getElementById('loading-status');
      setTimeout(() => {
        status.textContent = "Otorgando permisos de Calendario y YouTube Music...";
      }, 800);

      setTimeout(() => {
        status.textContent = "Sincronizando licencias satelitales...";
      }, 1600);

      setTimeout(() => {
        // Send success payload to app.js
        window.opener.postMessage({
          status: 'success',
          name: selectedName,
          email: selectedEmail,
          musicConnected: document.getElementById('perm-music').checked
        }, '*');
        window.close();
      }, 2400);
    }
  </script>
</body>
</html>
